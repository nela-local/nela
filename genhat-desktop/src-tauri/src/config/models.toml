# ═══════════════════════════════════════════════════════════════════════════════
# GenHat Model Registry
# ═══════════════════════════════════════════════════════════════════════════════
# Add a new [[models]] entry to register a new model. The process control
# module will lazily load it on first request that matches its `tasks` list.
#
# Fields:
#   id              – unique slug (used in code and logs)
#   name            – human-readable display name
#   backend         – "llama_server" | "llama_cli" | "parakeet"
#   kind            – "child_process" | "in_process"
#   model_file      – path relative to the models directory
#   tasks           – list of task types this model can handle
#   auto_start      – if true, loaded at app launch (default: false)
#   max_instances   – max concurrent instances (child_process) or always 1 (in_process)
#   idle_timeout_s  – seconds before an idle ephemeral instance is killed (0 = immediate)
#   priority        – higher = preferred when multiple models match a task
#   memory_mb       – estimated peak memory in MB (for resource budgeting)
#   [models.params] – backend-specific key-value parameters
# ═══════════════════════════════════════════════════════════════════════════════

# ── LLM: Liquid Foundation Model (llama-server) ──────────────────────────────
# Mid-priority fallback for both chat and podcast. Handles enrichment.

[[models]]
id = "lfm-1_2b"
name = "LFM 1.2B INT8"
backend = "llama_server"
kind = "child_process"
model_file = "LLM/LFM-1.2B-INT8.gguf"
tasks = ["chat", "summarize", "mindmap", "enrich", "hyde", "podcast_script"]
auto_start = false
max_instances = 2
idle_timeout_s = 300
priority = 20
memory_mb = 1400

[models.params]
ctx_size = "16384"
port = "0"
max_tokens = "256"
temp = "0.7"
top_p = "0.9"
top_k = "40"
repeat_penalty = "1.1"

# ── LLM: Qwen3.5-0.8B (llama-server) ────────────────────────────────────────
# Primary model for chat / LLM tasks (highest priority). Thinking disabled for
# faster, direct answers.  Lowest priority for podcast script generation.

[[models]]
id = "qwen3.5-0_8b"
name = "Qwen3.5 0.8B Q4"
backend = "llama_server"
kind = "child_process"
model_file = "LLM/Qwen3.5-0.8B-UD-Q4_K_XL.gguf"
tasks = ["chat", "summarize", "mindmap", "enrich", "hyde", "podcast_script"]
auto_start = false
max_instances = 2
idle_timeout_s = 300
priority = 30
memory_mb = 900

[models.params]
ctx_size = "4096"
port = "0"
max_tokens = "2048"
temp = "0.7"
top_p = "0.9"
top_k = "40"
repeat_penalty = "1.1"
flash_attn = "true"
mlock = "true"
chat_template_kwargs = '{"enable_thinking": false}'

[models.task_priorities]
podcast_script = 10

