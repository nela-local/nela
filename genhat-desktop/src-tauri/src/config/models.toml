port = "0"
embedding = "true"
batch_size = "512"

# ── Embedding: BGE-base-en-v1.5 (llama-server --embedding mode) ──────────────
# Higher priority than bge-small (768-dim vs 384-dim → better retrieval quality).
# NOTE: Switching between bge-small and bge-base requires re-ingesting all
# documents (delete rag.db) because embedding dimensions are incompatible.

[[models]]
id = "bge-base-embed"
name = "BGE-base-en-v1.5 Q8"
backend = "llama_server"
kind = "child_process"
model_file = "bge-1.5-embed/bge-base-en-v1.5-q8_0.gguf"
tasks = ["embed"]
auto_start = false
max_instances = 1
idle_timeout_s = 120
priority = 15
memory_mb = 420

[models.params]
ctx_size = "1024"
port = "0"
embedding = "true"
batch_size = "512"

# ── Query Router: DistilBERT Classifier (ONNX Runtime in-process) ─────────────

[[models]]
id = "query-router"
name = "GenHat Query Router (DistilBERT ONNX)"
backend = "onnx_classifier"
kind = "in_process"
model_file = "distilBert-query-router/onnx_model/model.onnx"
tasks = ["classify"]
auto_start = false
max_instances = 1
idle_timeout_s = 300
priority = 10
memory_mb = 300

[models.params]
config_file = "distilBert-query-router/onnx_model/config.json"
tokenizer_file = "distilBert-query-router/onnx_model/tokenizer.json"
max_length = "64"

