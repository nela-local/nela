name: PR Checks

on:
  pull_request:
    branches: ["**"]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend checks ────────────────────────────────────────────────────────
  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: genhat-desktop/package-lock.json

      - name: Install dependencies
        working-directory: genhat-desktop
        run: npm ci

      - name: TypeScript type check
        working-directory: genhat-desktop
        run: npx tsc -b --noEmit

      - name: ESLint
        working-directory: genhat-desktop
        run: npx eslint .

  # ── Rust backend tests ─────────────────────────────────────────────────────
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            genhat-desktop/src-tauri/target
          key: rust-${{ runner.os }}-${{ hashFiles('genhat-desktop/src-tauri/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            pkg-config
      
      - name: Ensure model placeholders
        run: |
          mkdir -p \
            models/bge-1.5-embed \
            models/distilBert-query-router/onnx_model \
            models/grader/ms-marco-MiniLM-L6-v2-onnx-int8 \
            models/tts/kitten-tts/mini \
            models/LLM \
            models/LiquidAI-VLM \
            models/parakeet
          touch \
            models/.placeholder \
            models/bge-1.5-embed/.placeholder \
            models/distilBert-query-router/.placeholder \
            models/distilBert-query-router/onnx_model/.placeholder \
            models/grader/.placeholder \
            models/grader/ms-marco-MiniLM-L6-v2-onnx-int8/.placeholder \
            models/tts/.placeholder \
            models/tts/kitten-tts/.placeholder \
            models/tts/kitten-tts/mini/.placeholder \
            models/LLM/.placeholder \
            models/LiquidAI-VLM/.placeholder \
            models/parakeet/.placeholder

      - name: Run cargo test
        working-directory: genhat-desktop/src-tauri
        run: cargo test --lib

  # ── Gate job (add as required status check in branch protection) ───────────
  pr-ci:
    name: PR CI ✅
    if: always()
    needs: [frontend-checks, rust-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.frontend-checks.result }}" != "success" ]]; then
            echo "❌ frontend-checks failed"
            exit 1
          fi
          if [[ "${{ needs.rust-tests.result }}" != "success" ]]; then
            echo "❌ rust-tests failed"
            exit 1
          fi
          echo "✅ All PR checks passed"
