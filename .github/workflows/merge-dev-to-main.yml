name: Promote Dev to Main

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: v0.1.0)"
        required: true
      release_name:
        description: "Release title"
        required: true

jobs:
  # ── Rust backend tests (must pass before merge) ─────────────────────────────
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            genhat-desktop/src-tauri/target
          key: rust-${{ runner.os }}-${{ hashFiles('genhat-desktop/src-tauri/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Run cargo test
        working-directory: genhat-desktop/src-tauri
        run: cargo test --lib

      - name: Run clippy lints
        working-directory: genhat-desktop/src-tauri
        run: cargo clippy --lib -- -D warnings

  # ── Merge dev → main (only after tests pass) ───────────────────────────────
  promote:
    needs: [rust-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Merge dev into main
        run: |
          git fetch origin
          git checkout main
          git merge origin/dev --no-edit
          git push origin main

      - name: Create release tag
        run: |
          git tag -d ${{ github.event.inputs.version }} 2>/dev/null || true
          git push origin :refs/tags/${{ github.event.inputs.version }} 2>/dev/null || true
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}
      
      - name: Save release version
        run: echo "${{ github.event.inputs.version }}" > version.txt
      
      - name: Upload version artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-version
          path: version.txt

  trigger-build:
    needs: promote
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Trigger Tauri Multi-Platform Build
        run: |
          gh workflow run "tauri-multi-build.yml" \
            --ref main \
            -f version="${{ github.event.inputs.version }}" \
            -f release_name="${{ github.event.inputs.release_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}