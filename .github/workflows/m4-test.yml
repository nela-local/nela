name: Temporary M4 Compatibility Test

on:
  workflow_dispatch:

jobs:
  m4-compatibility:
    name: M4 Pro macOS 15 build and diagnostics
    runs-on: macos-15-large
    permissions:
      contents: read

    env:
      NODE_VERSION: 24

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Node Dependencies
        run: npm install
        working-directory: genhat-desktop

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Environment diagnostics
        shell: bash
        run: |
          set -euo pipefail
          echo "=== System ==="
          uname -a
          sw_vers
          sysctl -n machdep.cpu.brand_string || true
          echo "=== Toolchain ==="
          node --version
          npm --version
          rustc --version
          cargo --version
          echo "=== Tauri CLI ==="
          cd genhat-desktop
          npx tauri --version

      - name: Ensure model placeholders
        shell: bash
        run: |
          mkdir -p \
            models/bge-1.5-embed \
            models/distilBert-query-router/onnx_model \
            models/grader/ms-marco-MiniLM-L6-v2-onnx-int8 \
            models/tts/kitten-tts/mini \
            models/LLM \
            models/LiquidAI-VLM \
            models/parakeet
          touch \
            models/.placeholder \
            models/bge-1.5-embed/.placeholder \
            models/distilBert-query-router/.placeholder \
            models/distilBert-query-router/onnx_model/.placeholder \
            models/grader/.placeholder \
            models/grader/ms-marco-MiniLM-L6-v2-onnx-int8/.placeholder \
            models/tts/.placeholder \
            models/tts/kitten-tts/.placeholder \
            models/tts/kitten-tts/mini/.placeholder \
            models/LLM/.placeholder \
            models/LiquidAI-VLM/.placeholder \
            models/parakeet/.placeholder

      - name: Run Rust backend tests
        shell: bash
        working-directory: genhat-desktop/src-tauri
        run: |
          set -o pipefail
          cargo test --lib 2>&1 | tee "$RUNNER_TEMP/cargo-test-m4.log"

      - name: Build Tauri App (macOS dmg)
        shell: bash
        working-directory: genhat-desktop
        run: |
          set -o pipefail
          npx tauri build --bundles dmg 2>&1 | tee "$RUNNER_TEMP/tauri-build-m4.log"

      - name: Collect bundle listing
        if: always()
        shell: bash
        run: |
          set +e
          BUNDLE_DIR="genhat-desktop/src-tauri/target/release/bundle"
          if [ -d "$BUNDLE_DIR" ]; then
            find "$BUNDLE_DIR" -maxdepth 4 -print > "$RUNNER_TEMP/m4-bundle-tree.txt"
          else
            echo "Bundle directory not found: $BUNDLE_DIR" > "$RUNNER_TEMP/m4-bundle-tree.txt"
          fi

      - name: Upload M4 diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m4-compatibility-logs
          path: |
            ${{ runner.temp }}/cargo-test-m4.log
            ${{ runner.temp }}/tauri-build-m4.log
            ${{ runner.temp }}/m4-bundle-tree.txt
          if-no-files-found: warn
