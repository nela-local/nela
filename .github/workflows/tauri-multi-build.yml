name: Tauri Multi-Platform Build & Upload

on:
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            drive_folder: Windows
          # - os: ubuntu-latest
          #   drive_folder: Linux
          # - os: macos-latest
          #   drive_folder: Mac

    runs-on: ${{ matrix.os }}

    env:
      NODE_VERSION: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Node Dependencies
        run: npm install
        working-directory: genhat-desktop

      # Setup Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Linux System Dependencies
      # - name: Install Linux Dependencies
      #   if: matrix.os == 'ubuntu-latest'
      #   run: |
      #     sudo apt update
      #     sudo apt install -y \
      #       libwebkit2gtk-4.1-dev \
      #       libgtk-3-dev \
      #       libayatana-appindicator3-dev \
      #       librsvg2-dev

      # Build Tauri
      - name: Build Tauri App
        run: npx tauri build
        working-directory: genhat-desktop

      # Locate Build Artifact (Windows) — installer only, from bundle/nsis and bundle/msi
      - name: Locate Build Artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $bundleDir = "genhat-desktop/src-tauri/target/release/bundle"
          $file = Get-ChildItem -Path "$bundleDir/nsis","$bundleDir/msi" -Include *.exe,*.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          echo "ARTIFACT_PATH=$($file.FullName)" >> $env:GITHUB_ENV
          echo "ARTIFACT_NAME=$($file.Name)" >> $env:GITHUB_ENV

      # - name: Locate Build Artifact (Linux)
      #   if: matrix.os == 'ubuntu-latest'
      #   run: |
      #     FILE=$(find genhat-desktop/src-tauri/target/release -type f \( -name "*.AppImage" -o -name "*.deb" \) | head -n 1)
      #     echo "ARTIFACT_PATH=$FILE" >> $GITHUB_ENV
      #     echo "ARTIFACT_NAME=$(basename $FILE)" >> $GITHUB_ENV

      # - name: Locate Build Artifact (macOS)
      #   if: matrix.os == 'macos-latest'
      #   run: |
      #     FILE=$(find genhat-desktop/src-tauri/target/release -type f \( -name "*.dmg" -o -name "*.app" \) | head -n 1)
      #     echo "ARTIFACT_PATH=$FILE" >> $GITHUB_ENV
      #     echo "ARTIFACT_NAME=$(basename $FILE)" >> $GITHUB_ENV

      # Setup rclone for Google Drive
      - name: Install rclone (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install rclone -y

      # - name: Install rclone (Linux)
      #   if: matrix.os == 'ubuntu-latest'
      #   run: sudo apt install -y rclone

      # - name: Install rclone (macOS)
      #   if: matrix.os == 'macos-latest'
      #   run: brew install rclone

      - name: Configure rclone
        run: |
          echo '${{ secrets.GDRIVE_SERVICE_ACCOUNT }}' > service-account.json
          rclone config create gdrive drive `
            scope=drive.file `
            service_account_file=service-account.json

      # Upload to Google Drive — AppFiles/Releases/<OS>
      - name: Upload to Google Drive
        run: |
          rclone copy "${{ env.ARTIFACT_PATH }}" "gdrive:${{ vars.DRIVE_BASE_PATH }}/${{ matrix.drive_folder }}" --progress