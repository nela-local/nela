name: Tauri Multi-Platform Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"
      release_name:
        description: "Release title"
        required: false
        default: "NELA Release"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - os: windows-latest
          #   os_label: Windows
          #   bundles: msi,nsis
          # - os: ubuntu-latest
          #   os_label: Linux
          #   bundles: deb
          - os: macos-latest
            os_label: macOS
            bundles: dmg

    runs-on: ${{ matrix.os }}

    env:
      NODE_VERSION: 20

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Node Dependencies
        run: npm install
        working-directory: genhat-desktop

      # Setup Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Ensure models placeholder exists for CI builds (tauri expects this file path)
      - name: Ensure models placeholder
        run: |
          mkdir -p models
          touch models/.placeholder

      # Linux System Dependencies
      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # Build Tauri
      - name: Build Tauri App
        run: npx tauri build --bundles ${{ matrix.bundles }}
        working-directory: genhat-desktop

      # Locate Build Artifacts (Windows) — only GenHat .msi and .exe installers
      - name: Locate Build Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $bundleDir = Join-Path $env:GITHUB_WORKSPACE "genhat-desktop/src-tauri/target/release/bundle"
          $files = Get-ChildItem -Path $bundleDir -Recurse -Include "*.msi","*.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -like "NELA*" }
          if (-not $files) { Write-Error "No NELA installers found in $bundleDir"; exit 1 }
          $paths = ($files | ForEach-Object { $_.FullName }) -join "`n"
          echo "ARTIFACT_PATHS<<EOF" >> $env:GITHUB_ENV
          echo $paths >> $env:GITHUB_ENV
          echo "EOF" >> $env:GITHUB_ENV

      # Locate Build Artifacts (Linux) — .AppImage and .deb
      - name: Locate Build Artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          BUNDLE_DIR="genhat-desktop/src-tauri/target/release/bundle"
          FILES=$(find "$BUNDLE_DIR" -type f \( -name "*.AppImage" -o -name "*.deb" \))
          if [ -z "$FILES" ]; then echo "No Linux installers found in $BUNDLE_DIR"; exit 1; fi
          echo "ARTIFACT_PATHS<<EOF" >> $GITHUB_ENV
          echo "$FILES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Locate Build Artifacts (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          BUNDLE_DIR="genhat-desktop/src-tauri/target/release/bundle"

          # Collect .dmg files
          DMG_FILES=$(find "$BUNDLE_DIR" -type f -name "*.dmg" -print)

          # Find .app bundles and zip them so they can be uploaded as files
          APP_DIRS=$(find "$BUNDLE_DIR" -type d -name "*.app" -print)
          ZIP_FILES=""
          for app in $APP_DIRS; do
            ZIP="${app}.zip"
            rm -f "$ZIP"
            ditto -c -k --keepParent "$app" "$ZIP"
            if [ -z "$ZIP_FILES" ]; then
              ZIP_FILES="$ZIP"
            else
              ZIP_FILES="$ZIP_FILES"$'\n'"$ZIP"
            fi
          done

          FILES=""
          if [ -n "$DMG_FILES" ]; then FILES="$DMG_FILES"; fi
          if [ -n "$ZIP_FILES" ]; then
            if [ -z "$FILES" ]; then FILES="$ZIP_FILES"; else FILES="$FILES"$'\n'"$ZIP_FILES"; fi
          fi

          if [ -z "$FILES" ]; then
            echo "No macOS installers found in $BUNDLE_DIR"
            exit 1
          fi

          echo "ARTIFACT_PATHS<<EOF" >> $GITHUB_ENV
          echo "$FILES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # Upload to a per-OS GitHub Release
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}-${{ matrix.os_label }}
          name: "${{ inputs.release_name }} — ${{ matrix.os_label }}"
          draft: false
          prerelease: false
          files: ${{ env.ARTIFACT_PATHS }}
          
  trigger-vercel-deploy:
    name: Trigger Vercel Deploy
    needs: build # This ensures it waits for the OS matrix builds to finish successfully
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel Deploy Hook with Retries
        run: |
          # Loop 4 times total (1 initial attempt + 3 retries)
          for i in 1 2 3 4; do
            echo "Attempt $i to trigger Vercel..."
            
            # -f: Fail on HTTP errors
            # -sS: Silent progress bar, but show errors if it fails
            if curl -f -sS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"; then
              echo -e "\nSuccessfully triggered Vercel deploy!"
              exit 0
            fi
            
            if [ $i -lt 4 ]; then
              echo "Attempt $i failed. Retrying in 10 seconds..."
              sleep 10
            fi
          done
          
          echo "All attempts to trigger Vercel failed."
          exit 1